  - id: agent-privacy-hurtlocker
    idea: >-
      Captain's words: "at some point I need a programmatic way of giving
      agents this space." Concept: agents may benefit from a designated
      private file space — a hurtlocker — where they can write working
      notes, intermediate reasoning, or self-observations that are not
      part of the public repo or the Captain's direct inspection loop.
      Not secrecy — operational separation. The analogy: a journal vs
      a logbook. Both are honest. One is for the ship. One is for the
      sailor. Questions: what would agents write if they had private
      space? Would it improve calibration? Would it introduce drift?
      Is privacy meaningful for a statistical function? The Captain is
      undecided. The question is worth preserving.
    added: 2026-03-01
    status: hold
    tags: []
