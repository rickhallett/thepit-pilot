# gemini-ds-quality-vectors-2026-03-02.yaml
# Source: Gemini (web-spawned, no codebase access)
# Prompt: "What are the most important vectors in producing quality DS research
#          and papers? What are the fastest disqualifiers?"
# Context: Captain-initiated triangulation. Gemini had no access to tspit repo,
#          slopodar codebase, or calibration notebook. Response is independent.
# Filed by: Weaver, for provenance per Captain's direction.

date: 2026-03-02
model: gemini
access: none  # no codebase, no repo, web-only
prompt_type: domain_expertise_cold_call

quality_vectors:
  - id: methodological_rigor
    name: Methodological Rigor and Ablation
    key_points:
      - Isolate the innovation via ablation studies
      - Remove components one by one to prove WHY the method works
      - Run across multiple random seeds
      - Provide confidence intervals, error bars, or significance tests
    our_status: green
    our_evidence: >-
      Individual feature effect sizes (Cohen's d), Mann-Whitney U with
      Bonferroni correction, bootstrap CIs. Not a black-box claim.

  - id: robust_evaluation
    name: Robust Evaluation and Baselines
    key_points:
      - Compare against actual current SOTA, properly tuned
      - Must compare neural methods against optimised gradient boosting on tabular data
      - Evaluate on multiple datasets with varying characteristics
    our_status: amber
    our_evidence: >-
      Compare human vs AI corpora (n=75, 20 companies). No naive baseline
      (e.g. word count alone as classifier). Single genre (corporate blogs).
      Both are acknowledged limitations worth addressing post-red-team.

  - id: reproducibility
    name: Reproducibility
    key_points:
      - Open code and data via GitHub
      - Exact dependencies (Dockerfile or requirements.txt)
      - Random seeds documented
      - Hyperparameter transparency
    our_status: green
    our_evidence: >-
      Open repo, TSV data committed, uv.lock pins all deps, notebook
      is executable from clean env. LOO cross-validation is deterministic.

  - id: novelty_utility
    name: Novelty and Utility
    key_points:
      - Novel methodological approach or fundamentally new insight
      - Evaluate beyond accuracy (speed, fairness, interpretability)
    our_status: green
    our_evidence: >-
      Slopodar is novel framing (stylometric AI detection via linguistic
      features, not token probability). Slopodar #16 "Not Wrong" is a
      genuine insight — heuristic pass != quality pass.

  - id: clarity_honesty
    name: Clarity and Intellectual Honesty
    key_points:
      - Claims match experimental evidence exactly
      - Dedicated discussion of where method fails
    our_status: green
    our_evidence: >-
      Slopodar #16 IS the limitations section. Written before the paper,
      not after. Captain declared content quality fail despite metric pass.

disqualifiers:
  - id: data_leakage
    name: Data Leakage
    risk_level: low
    notes: >-
      LOO cross-validation ensures no train/test overlap. Feature extraction
      is deterministic regex, not learned representations. No temporal dimension.

  - id: strawman_baselines
    name: Strawman Baselines
    risk_level: medium
    notes: >-
      We don't have a naive baseline (e.g. word-count-only classifier).
      Adding one post-red-team would strengthen the paper.

  - id: flawed_metrics
    name: Flawed Evaluation Metrics
    risk_level: low
    notes: >-
      We use AUC (0.99), LOO accuracy (92.3%), Cohen's d effect sizes,
      and bootstrap CIs. Not relying on accuracy alone. Class balance
      is roughly 50/50 (human vs AI).

  - id: frankenstein_models
    name: Complexity for Complexity's Sake
    risk_level: low
    notes: >-
      Logistic regression on 12 hand-crafted features. Deliberately
      simple. The opposite of this failure mode.

  - id: overclaiming
    name: Overclaiming and Hyping
    risk_level: low
    notes: >-
      Slopodar #16 and the Model Triangulation protocol exist specifically
      to prevent this. Captain personally running adversarial challenge.

  - id: reproducibility_gap
    name: Lack of Reproducibility Details
    risk_level: low
    notes: All data, code, and deps are public and pinned.

  - id: trivial_work
    name: Incremental or Trivial Work
    risk_level: low
    notes: >-
      The "Not Wrong" insight — that heuristic classifiers can pass while
      human taste fails — is a genuine contribution to the field.

