title: keelstate-adversarial-codex
date: 2026-03-01
scope: shared/keelstate cross-model evaluation target
review_type: adversarial review for statistical phenomena hiding in code syntax
findings:
  - Offset pagination biases over time: batchQuery uses offset/limit, vulnerable to drift under concurrent writes (skips/duplicates). This can skew distributions in exports without obvious errors. If exports are used for statistics, prefer keyset pagination or snapshot isolation.
  - Whole-dataset materialization still happens: collect() builds full arrays, so output size still scales to total rows; batch size only reduces DB chunking, not memory. This can silently truncate or fail in a way that produces partial datasets—statistical artifacts rather than clean failures.
  - Missing dataset invariants: No explicit checks for monotonic IDs, stable ordering, or export consistency (e.g., counts vs. payload length). Without invariants, partial reads can look “valid” but be statistically wrong.
  - Time-dependent fields without ordering: bouts read is not ordered; export depends on DB default order, which can vary. This creates non-deterministic sampling across runs—hard to detect, easy to misinterpret.
  - Potential schema drift: State unmarshalling accepts unknown fields by default, despite comment saying “Unknown fields are rejected.” The decoder doesn’t enforce that, which can hide schema creep in .keel-state and create inconsistent operational telemetry.
fixes_if_wanted:
  - Keyset pagination or consistent ordering for exports.
  - Export invariants (counts, deterministic sort).
  - Use json.Decoder{DisallowUnknownFields:true} in Read and ReadModifyWrite.
