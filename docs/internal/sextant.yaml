# ╔══════════════════════════════════════════════════════════════════╗
# ║                         THE SEXTANT                             ║
# ║                                                                 ║
# ║  The Captain's Cognitive Calibration Instruments                ║
# ║                                                                 ║
# ║  Separated from the operational lexicon (lexicon.md) because    ║
# ║  operational governance and cognitive calibration flow through  ║
# ║  different channels, even though both flow through the Captain. ║
# ║  The naval terms govern the ship. These terms govern the        ║
# ║  navigator.                                                     ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# ╔══════════════════════════════════════════════════════════════════╗
# ║                    THE PHYSICAL SEXTANT                         ║
# ║                                                                 ║
# ║  A sextant measures the angle between a celestial body and     ║
# ║  the horizon. With that angle, the current time, and a         ║
# ║  nautical almanac, you can compute your position on the        ║
# ║  earth's surface to within a nautical mile.                    ║
# ║                                                                 ║
# ║  HOW IT WORKS                                                  ║
# ║  1. Select a reference star (you must know which one)          ║
# ║  2. Look through the eyepiece at the horizon                   ║
# ║  3. Adjust the index arm until the star's reflection sits      ║
# ║     exactly on the horizon line                                ║
# ║  4. Read the angle from the graduated arc                      ║
# ║  5. Note the exact time                                        ║
# ║  6. Compute your position using the almanac tables             ║
# ║                                                                 ║
# ║  SUCCESS CONDITIONS                                             ║
# ║  - Clear sky (you need to see the stars)                       ║
# ║  - Visible horizon (you need the reference line)               ║
# ║  - Accurate timepiece (seconds matter at sea)                  ║
# ║  - Correct star identification (wrong star = wrong position)   ║
# ║  - Steady hands or compensation for platform motion            ║
# ║                                                                 ║
# ║  FAILURE CONDITIONS                                             ║
# ║  - Overcast sky: no reference points visible                   ║
# ║  - Fog: no horizon to sight against                            ║
# ║  - Wrong star identified: confident but wrong position         ║
# ║  - Clock error: position drifts proportional to time error     ║
# ║  - Index error uncorrected: systematic bias in every reading   ║
# ║                                                                 ║
# ║  COMPETENCE RUBRIC                                              ║
# ║  Starting to feel capable:                                     ║
# ║  [ ] Can identify reference stars and take a clean sight       ║
# ║  [ ] Can compute a position line from a single observation     ║
# ║  [ ] Understands index error and can correct for it            ║
# ║  [ ] Can take three-star fix and get a reliable triangle       ║
# ║                                                                 ║
# ║  Next goals that show real improvement:                        ║
# ║  [ ] Multiple-star fixes in rough weather (noisy data)         ║
# ║  [ ] Moon/planet observations (harder geometry, richer signal) ║
# ║  [ ] Refraction corrections near the horizon (edge cases)      ║
# ║  [ ] Running fixes: combining observations across time         ║
# ║  [ ] Knowing when NOT to trust a reading                       ║
# ║                                                                 ║
# ║  The last one is the hardest and the most important.           ║
# ╚══════════════════════════════════════════════════════════════════╝
#
# Machine-readable. Transformation-ready. YAML chosen for
# consistency with slopodar.yaml and holding-deck.yaml.
#
# Entry schema:
#   id:                kebab-case identifier
#   term:              formal DS/cognitive science name
#   captain_words:     the Captain's original phrasing that mapped to this concept
#   definition:        formal definition (DS/ML/statistics)
#   bridge:            how captain_words maps to definition
#   scope:             llm | human | both
#   category_one:      true if this is a Category One risk
#   citations:         list of citation ids (backref to citations.yaml)
#   backrefs:          SDs, files, lexicon entries
#   added:             date first recorded
#
# Backref: lexicon.md v0.12, SD-252

