title: ai-blindspot-framework-codex
purpose: Deterministic checklist and reporting structure for blind spots in AI generated code suites.
scope:
  - System level behavior, not language specific style issues.
  - Evidence driven assessment, not speculation.
  - Focus on mismatches between claims, guarantees, tests, and runtime reality.
assumptions:
  - No codebase inspection required to use the framework.
  - Findings must be labeled with evidence level.
  - Claims are hypotheses until verified by artifacts or tests.
taxonomy:
  - name: claims_vs_evidence
    checks:
      - Feature claims mapped to explicit execution paths.
      - Security, privacy, compliance claims mapped to concrete controls.
      - Performance claims mapped to baselines and benchmarks.
      - Compatibility claims mapped to migration tests and fixtures.
      - Determinism claims reconciled with stochastic or time based behavior.
  - name: test_oracle_and_coverage
    checks:
      - Tests validate outcomes, not just shapes or status codes.
      - Failure paths and boundary conditions covered.
      - Mocks do not replace critical integration behavior.
      - Idempotency and concurrency behavior exercised.
      - Upgrade and downgrade compatibility tested.
  - name: reliability_and_recovery
    checks:
      - Timeouts, retries, and backoff strategies implemented and tested.
      - Partial failure handling validated.
      - Circuit breaker or degradation paths exist for dependencies.
      - Rollback strategy documented and verified.
      - Data corruption detection and repair paths defined.
  - name: security_and_abuse
    checks:
      - Authentication lifecycle tested: expiry, revocation, rotation.
      - Authorization checks resilient to bypass attempts.
      - Input validation and output encoding consistent.
      - Rate limiting and abuse controls present and tested.
      - Secrets handling and logging redaction enforced.
  - name: observability_and_diagnostics
    checks:
      - Structured logs with correlation identifiers.
      - Metrics for latency, error rate, saturation, and throughput.
      - Tracing across multi hop paths.
      - Operator visible error modes with actionable signals.
      - Alert thresholds and escalation paths defined.
  - name: data_integrity
    checks:
      - Invariants enforced at boundaries.
      - Duplicate suppression or idempotency keys in place.
      - Concurrency and race conditions modeled and tested.
      - Schema migrations reversible or forward compatible.
      - Provenance and audit trail for critical records.
  - name: operational_readiness
    checks:
      - SLOs and error budgets defined.
      - Load and stress testing at realistic traffic patterns.
      - Dependency pinning and upgrade policy documented.
      - Environment parity verified for staging and production.
      - Runbooks for incidents and rollback tested.
  - name: product_and_user_risk
    checks:
      - UX promises match actual state transitions.
      - Error messages guide recovery, not just failure.
      - Accessibility and localization coverage assessed.
      - Performance on low end devices or slow networks tested.
      - Privacy expectations align with data flows.
method:
  steps:
    - Inventory claims from docs, README, marketing, and in app UI.
    - Map each claim to tests, metrics, controls, or artifacts.
    - Identify critical paths and verify success, failure, recovery, abuse.
    - Verify non functional controls: reliability, security, observability, integrity.
    - Grade evidence levels and assign severity.
evidence_levels:
  - id: E0
    meaning: No evidence provided.
  - id: E1
    meaning: Stated but not tested.
  - id: E2
    meaning: Partial or indirect evidence.
  - id: E3
    meaning: Direct, repeatable evidence.
severity_levels:
  - id: S1
    meaning: Cosmetic or low impact.
  - id: S2
    meaning: Moderate user impact or support load.
  - id: S3
    meaning: High user impact, data risk, or revenue risk.
  - id: S4
    meaning: Critical system or trust failure.
reporting_format:
  - Summary with claim count and evidence distribution.
  - Top risks: all S3 and S4 items.
  - Coverage map: category by evidence level.
  - Follow ups: evidence requests needed to promote E0 and E1 to E3.
stop_conditions:
  - If E0 spans all categories, report high uncertainty and request evidence.
  - If any S4 risk lacks at least E2 evidence, recommend immediate remediation plan.
