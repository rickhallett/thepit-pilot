# evidence-log-audit-defects.yaml — Per-fix evidence log
# Each entry: what was broken, what test proves the fix, what would have failed before.
# Purpose: makes evidence level explicit, prevents regression to E1 claims.
# Back-ref: Watchdog audit-findings-v1.md, v2.md, ai-blindspot-findings-codex.yaml

fixes:

  - id: F4-F6
    finding: winner-vote allows voting for non-participant agents
    severity: HIGH + CRITICAL (tautological test)
    file_changed: app/api/winner-vote/route.ts
    fix_description: >-
      Added agent participation check — verifies agentId appears in
      bout.transcript[].agentId OR bout.agentLineup[].id before insert.
      Returns 403 'Agent was not a participant in this bout.' on failure.
    evidence_level: E2 (unit + negative boundary tests)
    tests:
      - name: "rejects vote for agent not in bout transcript"
        file: tests/api/winner-vote-success.test.ts
        scenario: "Valid boutId with transcript containing agent-a/agent-b, vote for agent-x"
        expected_before_fix: "200 ok:true — vote silently accepted for non-participant"
        expected_after_fix: "403 Agent was not a participant in this bout"
      - name: "rejects vote for agent not in arena lineup"
        file: tests/api/winner-vote-success.test.ts
        scenario: "Arena bout with lineup arena-1/arena-2, vote for intruder"
        expected_before_fix: "200 ok:true — vote accepted, leaderboard corrupted"
        expected_after_fix: "403 Agent was not a participant in this bout"
      - name: "accepts vote for agent found only in arena lineup"
        file: tests/api/winner-vote-success.test.ts
        scenario: "Arena bout with empty transcript but valid lineup, vote for arena-1"
        expected_before_fix: "200 — would have passed, correct outcome, wrong reason"
        expected_after_fix: "200 — correct outcome, correct reason, OR logic verified"

  - id: F5
    finding: reactions accepts orphan boutId/turnIndex without existence check
    severity: MEDIUM
    file_changed: app/api/reactions/route.ts
    fix_description: >-
      Added bout existence check and turnIndex bounds validation before
      toggle logic. Returns 404 for missing bout, 400 for invalid turn.
    evidence_level: E2 (unit + negative boundary tests)
    tests:
      - name: "returns 404 for non-existent boutId"
        file: tests/api/reactions-validation.test.ts
        scenario: "POST with boutId phantom-bout — DB returns empty"
        expected_before_fix: "200 ok:true action:added — orphan row inserted"
        expected_after_fix: "404 Bout not found"
      - name: "returns 400 for turnIndex beyond transcript length"
        file: tests/api/reactions-validation.test.ts
        scenario: "3-turn transcript, turnIndex 99"
        expected_before_fix: "200 ok:true action:added — phantom reaction stored"
        expected_after_fix: "400 Invalid turn index"
      - name: "returns 400 for negative turnIndex"
        file: tests/api/reactions-validation.test.ts
        scenario: "turnIndex -1"
        expected_before_fix: "Caught by Zod schema (pre-existing defense)"
        expected_after_fix: "400 Zod validation error (unchanged)"

  - id: F1
    finding: research-exports loads all rows into memory — guaranteed OOM at scale
    severity: HIGH
    file_changed: lib/research-exports.ts
    fix_description: >-
      Replaced 4 unbounded SELECT * queries with cursor-based pagination
      using async generator (batchQuery). BATCH_SIZE=1000. Memory usage
      now O(batch) instead of O(total). External interface unchanged.
    evidence_level: E2 (unit + batch behavior tests)
    tests:
      - name: "handles large datasets without loading all rows at once"
        file: tests/unit/research-exports-batch.test.ts
        scenario: Mock returns BATCH_SIZE rows then 42 rows
        expected_before_fix: N/A — single unbounded query, no pagination
        expected_after_fix: 2 query calls with correct offset/limit, all rows yielded
      - name: "returns empty when first batch is empty"
        file: tests/unit/research-exports-batch.test.ts
        scenario: Empty dataset
        expected_before_fix: Works (empty array) — same outcome, different mechanism
        expected_after_fix: Single query, zero rows yielded, clean termination

  - id: F2
    finding: seed-agents sequential inserts without transaction boundary
    severity: MEDIUM
    file_changed: app/api/admin/seed-agents/route.ts
    fix_description: >-
      Wrapped all DB inserts in db.transaction(). EAS attestation calls
      execute post-commit (not transactional — external API).
    evidence_level: E2 (unit + rollback test)
    tests:
      - name: "rolls back all inserts when one fails mid-loop"
        file: tests/api/seed-agents.test.ts
        scenario: 3rd insert throws, verify earlier inserts rolled back
        expected_before_fix: Partial state — some agents created, some not
        expected_after_fix: All inserts rolled back atomically

  - id: F3
    finding: contact route destroys stack traces with String(err)
    severity: LOW
    file_changed: app/api/contact/route.ts
    fix_description: >-
      Replaced String(err) with structured extraction: err.message + err.stack
      when err instanceof Error, falling back to String(err) for non-Error.
    evidence_level: E1 (code review — logging change, no behavioral test)
    tests: []
    notes: >-
      No test added — this is a logging improvement. The behavioral test
      (email failure still returns 200) is unchanged and passing.
