# beyond-captain.yaml - Questions for future research
#
# Things that occur to the Captain that would otherwise get lost
# into the winds of time. Nearly all of them do. Working hard to
# change this now.
#
# These are not tasks. They are not holding-deck items. They are
# questions - some half-formed, some precise, all worth preserving
# because the asking is itself a data point about where the work
# is heading.
#
# Captain's words are verbatim. No em-dash conversion. No polish.
# Hyphens are hyphens. Typos are typos. The form is data.
#
# Schema:
#   id:       kebab-case
#   question: Captain's words, verbatim
#   context:  what prompted this, if known
#   added:    date
#   status:   open | exploring | parked | resolved
#   backrefs: related files, SDs, sextant entries

entries:

  - id: religion-spirituality-l12
    question: >-
      How does religion and spirituality fit into our working
      assumption that there 'is no higher authority than L12'.
    random_thoughts: >-
      All humans have central governing structures analogous to
      'God' whether they name it, think its spiritual, think its
      earthly/object/place/time/ideal/<...>; cognitively modelled,
      that structure is implicitly or explicitly to varying degrees
      acting as an authority 'outside' the human, even if it was a
      purely phenomenological artefact - whether it is 'real' or
      not doesn't much change the effects of a governing function
      if the human acts 'as if' it was real (see relational frame
      theory for more details, deferred).
    context: >-
      Emerged during sextant creation session. The layer model
      places L12 (the human) as the highest authority. But the
      human may themselves be governed by structures - spiritual,
      ideological, relational - that sit outside the model. The
      question is whether L12 is truly the ceiling or whether L12
      is itself governed by something the model cannot represent.
    added: 2026-03-01
    status: open
    backrefs:
      - sextant.yaml (who governs the navigator)
      - holding-deck.yaml (who-governs-the-captain)
      - docs/lexical-harness-not-prompt-harness.md (L12)

  - id: social-fabric-network-effects
    question: >-
      Is it possible to model the network effects of the social
      fabric of an individual enough that its effects on
      human -> llm governance reduce risk of exposure to the
      different dimensions of risk we are already identifying?
    random_thoughts: >-
      I'm not interested in creating Minority Report, for
      Heaven's sake- this is about safety, wellfare and survival.
    context: >-
      Emerged during sextant session. The regularisers identified
      (contemplative practice, clinical training, programming
      discipline) are individual. But the Captain operates within
      a social fabric - relationships, communities, professional
      networks - that also constrain and shape his interaction
      with the system. Could modelling those network effects
      improve risk assessment without crossing into surveillance?
    added: 2026-03-01
    status: open
    backrefs:
      - sextant.yaml (regularisation, automation-bias)
      - category-one-index.yaml (overfitting-repeated-exposure)

  - id: private-thoughts-less-sloppy
    question: >-
      Why are the model's "private thoughts" (reasoning tokens)
      on average the least sloppy of all outputs? What produces
      this effect? Is there anything the Captain can proactively
      do in response to this observation?
    random_thoughts: >-
      Captain's observation, 2026-03-01: "The biggest of all is
      that as the context pressure has grown - presumably because
      of the richness of whats in it - your general manner of
      speaking is less sloppy. Its worth me pointing out that your
      'private thoughts' are, on average, the least sloppiest of
      all outputs. I'm not sure what this is about yet, or if
      there is anything I can proactively do in response to that
      observation."
    context: >-
      The Captain observes that reasoning tokens (thinking blocks,
      the model's internal chain-of-thought before producing
      output) consistently read as less performative and more
      technically direct than the output itself. This is consistent
      with the hypothesis that the output layer carries additional
      optimisation pressure (helpfulness, politeness, structure)
      that the reasoning layer does not. If confirmed, this has
      implications for how the Captain reads and steers the system -
      the reasoning tokens may be a more reliable signal of the
      model's actual processing than the polished output.
      Cross-ref: SD-172 (reasoning token observation as steering),
      SD-162 (Map Is Not The Territory).
    added: 2026-03-01
    status: open
    backrefs:
      - sextant.yaml (anti-slop-signal-observation)
      - SD-172 (reasoning token observation)
      - SD-162 (The Map Is Not The Territory)
      - slopodar.yaml (general - output vs reasoning slop differential)
