name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'app/**'
              - 'components/**'
              - 'lib/**'
              - 'db/**'
              - 'tests/**'
              - 'scripts/**'
              - 'bin/**'
              - 'public/**'
              - 'pit*/**'
              - 'shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig*.json'
              - '*.config.*'
              - 'middleware.*'
              - 'go.work'
              - 'go.work.sum'
              - '.nvmrc'
              - '.github/workflows/**'

  lint:
    name: lint
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: typecheck
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test-unit:
    name: test-unit
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:unit

  integration:
    name: integration
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run integration tests with JSON report
        run: |
          mkdir -p qa/results runs
          pnpm exec vitest run tests/integration --coverage=false --reporter=default --reporter=json --outputFile qa/results/integration-vitest.json
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      - name: Build Level4 QA summary from vitest
        run: |
          pnpm run level4:qa-from-vitest --in qa/results/integration-vitest.json --out qa/results/latest.json
      - name: Emit Level4 eval record (CI integration lane)
        run: |
          WINDOW_ID="w-ci-${{ github.run_id }}"
          RUN_ID="ci-${{ github.run_id }}-${{ github.run_attempt }}"
          pnpm run level4:emit -- \
            --window "$WINDOW_ID" \
            --run "$RUN_ID" \
            --pipeline "tspit-ci-integration" \
            --class medium_integration \
            --qa qa/results/latest.json \
            --decision approved \
            --out "runs/${WINDOW_ID}.ndjson"
      - name: Upload Level4 contract artifacts
        uses: actions/upload-artifact@v4
        with:
          name: level4-contract-${{ github.run_id }}
          path: |
            qa/results/integration-vitest.json
            qa/results/latest.json
            runs/w-ci-${{ github.run_id }}.ndjson
          retention-days: 30

  go-gate:
    name: go-gate
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"
          cache-dependency-path: "*/go.sum"
      - run: make gate
        working-directory: pitctl
      - run: make gate
        working-directory: pitforge
      - run: make gate
        working-directory: pitlab
      - run: make gate
        working-directory: pitbench
      - run: make gate
        working-directory: pitnet
      - run: make gate
        working-directory: pitstorm

  security:
    name: security
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Dependency audit
        run: pnpm audit --audit-level=high
      - name: Security scan
        run: pnpm run security:scan
        continue-on-error: true  # scan targets live endpoints; may fail in CI without running server

  # Single required check — aggregates all job results.
  # Passes when: all code jobs passed, OR all were skipped (docs-only).
  # Fails when: any code job that ran has failed.
  ci-gate:
    name: ci-gate
    if: always()
    needs: [changes, lint, typecheck, test-unit, integration, go-gate, security]
    runs-on: ubuntu-latest
    steps:
      - name: Evaluate CI results
        run: |
          echo "Code changes detected: ${{ needs.changes.outputs.code }}"
          echo "Job results:"
          echo "  lint:        ${{ needs.lint.result }}"
          echo "  typecheck:   ${{ needs.typecheck.result }}"
          echo "  test-unit:   ${{ needs.test-unit.result }}"
          echo "  integration: ${{ needs.integration.result }}"
          echo "  go-gate:     ${{ needs.go-gate.result }}"
          echo "  security:    ${{ needs.security.result }}"

          # Fail if any job failed (not skipped, not cancelled — failed)
          RESULTS="${{ needs.lint.result }} ${{ needs.typecheck.result }} ${{ needs.test-unit.result }} ${{ needs.integration.result }} ${{ needs.go-gate.result }} ${{ needs.security.result }}"
          for result in $RESULTS; do
            if [ "$result" = "failure" ]; then
              echo "::error::CI gate failed — one or more jobs reported failure"
              exit 1
            fi
          done

          echo "CI gate passed"
