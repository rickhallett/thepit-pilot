  id: 1e
  intent: "Style pastiche of George Orwell on AI"
  predicted_sum_score: 20
  text: "Most talk about artificial intelligence is either boosterism or fear, and both are a kind of fog. The plain fact is that a machine can now arrange words in a way that passes for thought. This has tempted many people to let the machine do their thinking. It should not. A piece of writing is a record of a mind at work, and when the mind is replaced, the record is false. The pity is that the writing still looks neat. Neatness is not truth. The machine can write an answer in a second, but it cannot know why the answer matters. It cannot feel the weight of error. It cannot feel shame. It cannot feel relief. That is why the question of responsibility is not a technical question at all. It is a political one. If a company can hide behind a model, then a citizen cannot argue with it. If a citizen cannot argue, then the field is lost to the men who own the machines. The remedy is not to ban the tools, but to force the owner to sign his name to what the tool produces. A system that can be traced can be resisted. A system that cannot be traced is an engine of quiet power. There is also the dull habit of obedience, which grows when the answer arrives too easily. A man who lets a machine write for him will soon let the machine decide for him. The public will not notice the change at first, because the words will be smooth. But smooth words are not a sign of honest thought. They are a sign of rehearsal. The wiser course is to treat every line as a draft and to require a human name beneath it. Without that, the citizen is left arguing with a ghost. A ghost cannot be voted out."
