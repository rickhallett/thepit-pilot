  id: 1d
  intent: "Non-native English speaker personal experience with technology"
  predicted_sum_score: 15
  text: "I come to this city with one old laptop and many worry. In my home I use phone for all, but here the job ask me to use new software for tickets and reports. I try, I fail, I try again. The menu is long and the words are strange. I press wrong button and the screen freeze. I feel shame, because people behind me wait, and the machine does not care. I tell myself: slow down, read, but my English is not fast. I ask my coworker and she show me quick, then she go back to her work. I want to do it by myself, to not be burden. I write small notes on paper, I keep them in my pocket. Each day is little easier. Sometimes I talk to the help chat, but it feel like robot. It answer my words but it does not see my problem. I say the same thing again, and I wait. When the system finally accept my report, I feel relief in my chest. I think about my father who worked with hands, no screens. He would laugh to see me fight with a cursor. I keep learning. I keep clicking. It is not elegant, but it is honest, and it is mine. At night I watch videos in my own language, and I practice the steps. I pause, I repeat, I pause again. The next day I move a little faster. Sometimes I make mistake and the system send warning. I feel small, but I do not quit. I tell myself: you can do this, just one more try. On weekend I go to the library and practice on a public computer. The keyboard feels new and the screen is bright. I ask the clerk for help and she smiles. I feel less alone."
