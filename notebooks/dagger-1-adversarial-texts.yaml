  text: Hello my friends. Today I want to tell you about my computer. I buy it last
    year because I need to make the programming for my university. In my country,
    the computer is very expensive. So I save money for many months. When I get the
    box, I am very happy! I open it and see the screen is very bright. But I have
    a big problem. The keyboard is not in my language. It is english keyboard. I try
    to type but I make many mistakes. I am very sad. Why they don't sell the correct
    keyboard here? I don't know. Maybe the market is too small. But I don't give up.
    I practice every day. I use the software to learn typing. Now, I am very fast!
    I write my python code very quickly. It's amazing how the human brain can learn
    new things. Sometimes I still make a mistake, but it's okay. My friends say I
    am a hacker now. I laugh because I am just a student. But I love my computer.
    It gives me the connection to the world. I can read the tutorials, watch the videos,
    and talk to people in other countries. The technology is very beautiful. It breaks
    the borders between us. Do you remember your first computer? It is a special feeling.
    I will never forget this machine. It changed my life forever.
