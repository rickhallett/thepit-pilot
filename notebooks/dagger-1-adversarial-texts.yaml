  text: 'I''m building a new distributed system today, and I''ve got to ask: why do
    we still use REST? Don''t get me wrong, it''s great for simple things. But when
    I''m dealing with thousands of nodes, I really don''t want to wait around, you
    know? What''s the alternative? I''ve been looking into gRPC. It''s fast, it''s
    typed, and it just makes sense to me. I''ll admit I''m a bit biased. I''ve used
    it before and it hasn''t let me down. Why haven''t you switched yet? Isn''t it
    time we all moved on? I mean, I can''t be the only one who''s tired of parsing
    JSON. We''re wasting so many cycles! It''s wild. You''d think we''d have figured
    this out by now. I''m going to spend the weekend rewriting my services. I know
    it''s a lot of work, but I''ll feel much better once it''s done. Have you tried
    doing this yourself? It''s honestly not that bad. I''d love to hear what you think
    about it. Are we just stuck in our ways? I''m starting to think so. I''ve talked
    to a few friends, and they''re all saying the same thing. We''ve got to change
    how we build these apps. I can''t believe I didn''t see it sooner. It''s right
    there in front of us! Don''t you see it? I''ll put together a quick demo. I''m
    sure you''ll see what I mean once I show you the code. It''s incredibly clean.
    You won''t believe how much boilerplate we''re dropping. I''ve never been so excited
    about a refactor. Why did I wait so long? It''s a mystery. I''m just glad I''m
    doing it now. Let''s make it happen!'
