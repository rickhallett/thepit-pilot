<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- 48px: simplified. radar + em-dash bogey. -->
  <rect width="48" height="48" rx="8" fill="#1a1b26"/>
  <!-- rings -->
  <circle cx="24" cy="26" r="10" fill="none" stroke="#292e42" stroke-width="1.5"/>
  <circle cx="24" cy="26" r="19" fill="none" stroke="#292e42" stroke-width="1.5"/>
  <!-- sweep -->
  <line x1="24" y1="26" x2="36" y2="12" stroke="#7dcfff" stroke-width="2" stroke-linecap="round"/>
  <!-- center -->
  <circle cx="24" cy="26" r="2" fill="#7dcfff"/>
  <!-- the bogey: em-dash -->
  <text x="29" y="18"
        font-family="Georgia, serif"
        font-size="14"
        font-weight="700"
        fill="#ff9e64">—</text>
  <!-- detection ring -->
  <circle cx="33" cy="14" r="5" fill="none" stroke="#ff9e64" stroke-width="1" opacity="0.5"/>
</svg>
