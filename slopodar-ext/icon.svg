<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- background: Tokyo Night storm, rounded -->
  <rect width="128" height="128" rx="20" fill="#1a1b26"/>

  <!-- radar grid: just two rings, bold enough for 16px -->
  <circle cx="64" cy="68" r="28" fill="none" stroke="#292e42" stroke-width="2.5"/>
  <circle cx="64" cy="68" r="50" fill="none" stroke="#292e42" stroke-width="2.5"/>

  <!-- sweep cone: cyan, wider and bolder -->
  <path d="M 64 68 L 34 28 A 52 52 0 0 1 94 28 Z"
        fill="#7dcfff" opacity="0.15"/>

  <!-- sweep leading edge: bold cyan line -->
  <line x1="64" y1="68" x2="94" y2="28" stroke="#7dcfff" stroke-width="3" stroke-linecap="round"/>

  <!-- center dot: bold -->
  <circle cx="64" cy="68" r="4" fill="#7dcfff"/>

  <!-- THE BOGEY: an em-dash, detected on radar -->
  <!-- sitting in the sweep zone, glowing orange -->
  <!-- the canonical first detection. the one that started it all. -->
  <text x="79" y="52"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="32"
        font-weight="700"
        fill="#ff9e64">—</text>

  <!-- detection ring pulsing around the bogey -->
  <circle cx="88" cy="44" r="12" fill="none" stroke="#ff9e64" stroke-width="2" opacity="0.5"/>
  <circle cx="88" cy="44" r="18" fill="none" stroke="#ff9e64" stroke-width="1.5" opacity="0.2"/>

  <!-- version: small superscript top-right -->
  <text x="113" y="19"
        font-family="'SF Mono', 'Consolas', monospace"
        font-size="11"
        fill="#565f89"
        text-anchor="end">v0.2</text>
</svg>
