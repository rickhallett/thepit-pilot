<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16">
  <!-- 16px: maximum simplicity. dark bg, cyan sweep line, orange dot. -->
  <rect width="16" height="16" rx="3" fill="#1a1b26"/>
  <!-- single ring -->
  <circle cx="8" cy="9" r="5.5" fill="none" stroke="#3b4261" stroke-width="1.2"/>
  <!-- sweep line -->
  <line x1="8" y1="9" x2="12" y2="4" stroke="#7dcfff" stroke-width="1.5" stroke-linecap="round"/>
  <!-- center -->
  <circle cx="8" cy="9" r="1.2" fill="#7dcfff"/>
  <!-- the bogey -->
  <circle cx="11" cy="5" r="1.8" fill="#ff9e64"/>
</svg>
